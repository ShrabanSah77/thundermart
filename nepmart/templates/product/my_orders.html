<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders</title>
  </head>
  <body>
    <h1>My Orders</h1>
    {% for order in orders %}
    <div>
      <h3>Order #{{order.id}}</h3>
      <p>Status: {{order.status}}</p>
      <p>Total: ${{order.total_price}}</p>
      <p>Date: {{order.created_at}}</p>
    </div>
    <hr />
    {% empty %}
    <p>No orders found.</p>
    {% endfor %}
  </body>
</html>
